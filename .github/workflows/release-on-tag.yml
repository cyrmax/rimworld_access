name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore
        env:
          CI: true

      - name: Verify build output
        run: |
          $expected = @(
            "release/RimWorldAccess/Assemblies/rimworld_access.dll",
            "release/RimWorldAccess/About/About.xml",
            "release/RimWorldAccess/Tolk.dll",
            "release/RimWorldAccess/nvdaControllerClient64.dll",
            "release/RimWorldAccess/README.html",
            "release/RimWorldAccess/LICENSE"
          )
          foreach ($file in $expected) {
            if (-not (Test-Path $file)) {
              Write-Error "Missing: $file"
              exit 1
            }
          }
          Write-Host "All expected files present"

      - name: Create ZIP
        run: Compress-Archive -Path release/RimWorldAccess/* -DestinationPath RimWorldAccess.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: RimWorldAccess.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
